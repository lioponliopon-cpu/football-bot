name: Football Bot 自動發文

on:
  schedule:
    # 每週一早上 08:00 台灣時間（UTC+8 = UTC 00:00）發本週賽程
    - cron: "0 0 * * 1"
    # 每天早上 08:00 發今日賽程
    - cron: "0 0 * * *"
  workflow_dispatch:  # 也可以手動觸發測試

jobs:
  post-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安裝套件
        run: |
          pip install requests Pillow
          # 安裝中文字體
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
fc-cache -fv

      - name: 🤖 執行發文機器人
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          IG_ACCESS_TOKEN:  ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:       ${{ secrets.IG_USER_ID }}
          IMGBB_API_KEY:    ${{ secrets.IMGBB_API_KEY }}
        run: |
          python scripts/generate_post.py

      - name: 📤 上傳圖片（供確認用）
        uses: actions/upload-artifact@v4
        with:
          name: generated-image
          path: output/schedule.png
